name: Refresh NBA data

on:
  schedule:
    - cron: "0 9 * * *"   # every day at 09:00 UTC (~4-5am Eastern)
  workflow_dispatch: {}    # adds a "Run workflow" button you can click anytime

permissions:
  contents: write          # lets the job commit the updated data file

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch fresh NBA data
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: node scripts/fetch_data.mjs

      - name: Commit the update (only if data changed)
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add src/players.json
          git diff --staged --quiet || git commit -m "Nightly data refresh"
          git push
